<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Search — RWAToday.news</title>
<meta name="description" content="Search all RWAToday.news articles on RWA tokenization, blockchain, institutional adoption, and more."/>
<meta name="robots" content="noindex"/>
<link rel="canonical" href="https://rwatoday.news/search"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Archivo:wght@400;500;600;700&family=Archivo+Narrow:wght@400;600&display=swap" rel="stylesheet"/>
<style>
:root {
  --black: #080E0A;
  --ink: #0D1A10;
  --surface: #112418;
  --surface2: #163020;
  --border: #1E4028;
  --border2: #265235;
  --gold: #3DAA6E;
  --gold-light: #5DC48A;
  --gold-dim: rgba(61,170,110,0.15);
  --purple: #1F6B3E;
  --purple-light: #3DAA6E;
  --purple-dim: rgba(31,107,62,0.2);
  --cyan: #7CC49A;
  --red: #E8384A;
  --green: #00C896;
  --text: #E8F2EC;
  --text2: #A8C4B2;
  --muted: #5A8068;
  --white: #F0F4FA;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--black); color:var(--text); font-family:'Archivo',sans-serif; font-size:14px; line-height:1.6; overflow-x:hidden; }

/* NAV TABS */
.nav-tabs { display:flex; background:var(--ink); border-bottom:1px solid var(--border); padding:0 24px; gap:4px; position:sticky; top:0; z-index:100; overflow-x:auto; }
.tab-btn { background:none; border:none; color:var(--muted); font-family:'Archivo Narrow',sans-serif; font-size:11px; font-weight:600; letter-spacing:1.5px; text-transform:uppercase; padding:14px 18px; cursor:pointer; border-bottom:2px solid transparent; transition:all 0.2s; white-space:nowrap; }
.tab-btn:hover { color:var(--text2); }
.tab-btn.active { color:#3DAA6E; border-bottom-color:#3DAA6E; }
.panel { display:none; }
.panel.active { display:block; }

/* SITE NAV */
.site-nav { background:rgba(8,10,14,0.97); border-bottom:1px solid var(--border); padding:0 40px; display:flex; align-items:center; justify-content:space-between; height:60px; position:sticky; top:0; z-index:50; backdrop-filter:blur(10px); }
.site-logo { display:flex; align-items:center; gap:10px; }
.site-logo-mark { width:36px; height:36px; background:#1F6B3E; border-radius:50%; display:flex; align-items:center; justify-content:center; border:2px solid #3DAA6E; }
.site-logo-mark span { font-family:'Bebas Neue',sans-serif; font-size:16px; color:#fff; font-weight:900; }
.site-logo-text { font-family:'Bebas Neue',sans-serif; font-size:22px; letter-spacing:2px; color:var(--white); }
.site-logo-text em { color:#fff; font-style:normal; }
.site-nav-links { display:flex; gap:28px; list-style:none; }
.site-nav-links li a { text-decoration:none; color:var(--text2); font-family:'Archivo Narrow',sans-serif; font-size:12px; font-weight:600; letter-spacing:1px; text-transform:uppercase; }
.site-nav-links li a:hover, .site-nav-links li a.active { color:#3DAA6E; }
.btn-subscribe { background:#3DAA6E; color:#fff; border:none; padding:7px 18px; font-family:'Bebas Neue',sans-serif; font-size:14px; letter-spacing:1.5px; cursor:pointer; }

/* HERO GRID */
/* HOMEPAGE TWO-COLUMN LAYOUT */
.homepage-grid { display:grid; grid-template-columns:1fr 360px; gap:0; max-width:1280px; margin:0 auto; padding:32px 40px 40px; align-items:start; }
.homepage-left { padding-right:32px; border-right:1px solid var(--border); }
.homepage-right { padding-left:28px; }

/* Recently Featured */
.recently-featured { margin-top:12px; }
.rf-heading { font-family:'Bebas Neue',sans-serif; font-size:11px; letter-spacing:3px; color:var(--muted); text-transform:uppercase; padding-bottom:8px; border-bottom:1px solid var(--border); margin-bottom:12px; }
.rf-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; }
.rf-card { display:block; text-decoration:none; padding:14px 16px; background:var(--surface); border:1px solid var(--border); border-top:2px solid #3DAA6E; transition:border-color 0.2s; }
.rf-card:hover { border-color:#3DAA6E; }
.rf-cat { font-family:'Archivo Narrow',sans-serif; font-size:9px; letter-spacing:2px; text-transform:uppercase; color:#3DAA6E; margin-bottom:6px; }
.rf-title { font-family:'Archivo',sans-serif; font-size:12px; font-weight:700; color:var(--text); line-height:1.4; margin-bottom:6px; }
.rf-card:hover .rf-title { color:#3DAA6E; }
.rf-meta { font-family:'Archivo Narrow',sans-serif; font-size:10px; color:var(--muted); }

/* Right column top stories */
.sidebar-article { display:flex; align-items:flex-start; gap:12px; padding:12px 0; border-bottom:1px solid rgba(30,64,40,0.4); color:var(--text); }
.sidebar-article:last-of-type { border-bottom:none; }
.sidebar-article:hover { opacity:0.8; }
.see-all-link { display:flex; justify-content:space-between; align-items:center; padding:12px 0; font-family:'Bebas Neue',sans-serif; font-size:12px; letter-spacing:2px; color:#3DAA6E; text-decoration:none; border-top:1px solid var(--border); margin-top:4px; }
.see-all-link:hover { opacity:0.75; }

/* HERO CARDS */
.hero-main { background:var(--surface); border:1px solid var(--border); border-radius:2px; overflow:hidden; cursor:pointer; transition:border-color 0.2s; align-self:start; }
.hero-main:hover { border-color:#3DAA6E; }

/* Hero 1 — Utility tokens (green/earth) */
.hero-img-utility { height:300px; position:relative; overflow:hidden; background:linear-gradient(140deg,#061510 0%,#0A2015 35%,#0F2D1A 60%,#061510 100%); }
/* Hero 2 — Gaming (dark purple/electric) */
.hero-img-gaming { height:300px; position:relative; overflow:hidden; background:linear-gradient(140deg,#061510 0%,#0A2015 35%,#061A10 60%,#040E08 100%); }

.hero-grid-overlay { position:absolute; inset:0; background-image:linear-gradient(rgba(30,42,58,0.25) 1px,transparent 1px),linear-gradient(90deg,rgba(30,42,58,0.25) 1px,transparent 1px); background-size:40px 40px; }
.hero-glow-green { position:absolute; inset:0; background:radial-gradient(circle at 75% 35%,rgba(61,170,110,0.2) 0%,transparent 55%),radial-gradient(circle at 20% 70%,rgba(31,107,62,0.15) 0%,transparent 50%); }
.hero-glow-purple { position:absolute; inset:0; background:radial-gradient(circle at 30% 30%,rgba(31,107,62,0.3) 0%,transparent 55%),radial-gradient(circle at 80% 70%,rgba(61,170,110,0.15) 0%,transparent 50%); }

.hero-stat-block { position:absolute; top:24px; right:24px; text-align:right; }
.hero-stat-block .big-num { font-family:'Bebas Neue',sans-serif; font-size:52px; line-height:1; }
.hero-stat-block .big-label { font-family:'Archivo Narrow',sans-serif; font-size:10px; color:var(--muted); letter-spacing:2px; text-transform:uppercase; }
.color-gold { color:#3DAA6E; }
.color-purple { color:var(--purple-light); }

.hero-pills { position:absolute; bottom:24px; left:24px; display:flex; flex-direction:column; gap:6px; }
.pill-green { display:inline-flex; align-items:center; gap:6px; background:rgba(0,200,150,0.15); border:1px solid rgba(0,200,150,0.3); padding:4px 12px; border-radius:2px; font-family:'Archivo Narrow',sans-serif; font-size:11px; color:var(--green); }
.pill-purple { display:inline-flex; align-items:center; gap:6px; background:rgba(61,170,110,0.15); border:1px solid rgba(61,170,110,0.35); padding:4px 12px; border-radius:2px; font-family:'Archivo Narrow',sans-serif; font-size:11px; color:#5DC48A; }
.pill-cyan { display:inline-flex; align-items:center; gap:6px; background:rgba(0,212,255,0.1); border:1px solid rgba(0,212,255,0.25); padding:4px 12px; border-radius:2px; font-family:'Archivo Narrow',sans-serif; font-size:11px; color:var(--cyan); }

.hero-badge-row { padding:0 24px 0; position:relative; z-index:2; display:flex; gap:8px; align-items:center; }
.badge-featured { background:#3DAA6E; color:#fff; font-family:'Bebas Neue',sans-serif; font-size:11px; letter-spacing:2px; padding:3px 10px; }
.badge-gaming { background:#1F6B3E; color:var(--white); font-family:'Bebas Neue',sans-serif; font-size:11px; letter-spacing:2px; padding:3px 10px; border:1px solid #3DAA6E; }
.badge-live { background:rgba(0,200,150,0.15); border:1px solid rgba(0,200,150,0.3); color:var(--green); font-family:'Bebas Neue',sans-serif; font-size:10px; letter-spacing:1.5px; padding:3px 8px; display:inline-flex; align-items:center; gap:4px; }
.badge-live::before { content:'●'; font-size:7px; animation:pulse 1.5s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

.hero-content { padding:20px 24px 24px; }
.hero-cat { font-family:'Archivo Narrow',sans-serif; font-size:10px; letter-spacing:2px; text-transform:uppercase; color:#3DAA6E; margin-bottom:8px; }
.hero-cat-purple { color:#3DAA6E; }
.hero-title { font-family:'Bebas Neue',sans-serif; font-size:28px; line-height:1.05; letter-spacing:1px; color:var(--white); margin-bottom:10px; }
.hero-excerpt { color:var(--text2); font-size:13px; line-height:1.7; margin-bottom:14px; }
.hero-meta { display:flex; align-items:center; gap:16px; font-family:'Archivo Narrow',sans-serif; font-size:11px; color:var(--muted); }
.hero-meta .author { color:var(--text2); font-weight:600; }

/* TWO HERO STACKED */
.hero-stack { display:flex; flex-direction:column; gap:24px; }

/* SIDEBAR */
.hero-sidebar { display:none; }
.sidebar-heading { font-family:'Bebas Neue',sans-serif; font-size:11px; letter-spacing:3px; color:var(--muted); text-transform:uppercase; padding-bottom:12px; border-bottom:1px solid var(--border); }

.sidebar-article { display:flex; align-items:flex-start; gap:14px; padding:14px 0; border-bottom:1px solid var(--border); transition:opacity 0.2s; color:var(--text); }
.sidebar-article:hover { opacity:0.8; }
.sidebar-num { font-family:'Bebas Neue',sans-serif; font-size:22px; color:var(--border2); line-height:1; flex-shrink:0; width:28px; }
.sidebar-article:hover .sidebar-num { color:#3DAA6E; }
.sidebar-cat { font-family:'Archivo Narrow',sans-serif; font-size:10px; letter-spacing:1.5px; text-transform:uppercase; color:#3DAA6E; margin-bottom:3px; }
.sidebar-title { font-size:13px; font-weight:600; color:var(--text); line-height:1.4; margin-bottom:3px; }
.sidebar-time { font-size:11px; color:var(--muted); font-family:'Archivo Narrow',sans-serif; }

/* MARKET STRIP */
.market-strip { border-top:1px solid var(--border); border-bottom:1px solid var(--border); display:grid; grid-template-columns:repeat(5,1fr); gap:1px; background:var(--border); }
.market-item { background:var(--surface); padding:14px 20px; text-align:center; }
.market-item .asset-name { font-family:'Archivo Narrow',sans-serif; font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--muted); margin-bottom:3px; }
.market-item .asset-value { font-family:'Bebas Neue',sans-serif; font-size:18px; color:var(--text); margin-bottom:2px; }
.market-item .asset-change { font-family:'Archivo Narrow',sans-serif; font-size:11px; font-weight:600; }

/* CONTENT GRID */
.content-grid { max-width:1280px; margin:0 auto; padding:40px; display:grid; grid-template-columns:1fr 1fr 1fr 300px; gap:32px; }
.section-label { font-family:'Bebas Neue',sans-serif; font-size:11px; letter-spacing:3px; text-transform:uppercase; color:var(--muted); margin-bottom:20px; padding-bottom:10px; border-bottom:1px solid var(--border); grid-column:1/-1; display:flex; align-items:center; justify-content:space-between; }
.section-label a { font-size:10px; color:#3DAA6E; text-decoration:none; }
.article-card { cursor:pointer; transition:opacity 0.2s; }
.article-card:hover { opacity:0.85; }
.card-img { height:150px; margin-bottom:14px; position:relative; overflow:hidden; border:1px solid var(--border); }
.card-img-gold { background:linear-gradient(135deg,#0D1F35,#193050); }
.card-img-gold .ai { position:absolute; inset:0; background:radial-gradient(circle at 30% 70%,rgba(200,168,75,0.2) 0%,transparent 60%); }
.card-img-cyan { background:linear-gradient(135deg,#101A20,#1A2A30); }
.card-img-cyan .ai { position:absolute; inset:0; background:radial-gradient(circle at 70% 30%,rgba(0,212,255,0.15) 0%,transparent 60%); }
.card-img-purple { background:linear-gradient(135deg,#061510,#0F2D1A); }
.card-img-purple .ai { position:absolute; inset:0; background:radial-gradient(circle at 50% 40%,rgba(61,170,110,0.2) 0%,transparent 60%); }
.card-cat { font-family:'Archivo Narrow',sans-serif; font-size:10px; letter-spacing:2px; text-transform:uppercase; color:#3DAA6E; margin-bottom:6px; }
.card-title { font-family:'Archivo',sans-serif; font-size:14px; font-weight:700; color:var(--text); line-height:1.35; margin-bottom:8px; }
.card-excerpt { font-size:12px; color:var(--text2); line-height:1.6; margin-bottom:10px; }
.card-meta { font-family:'Archivo Narrow',sans-serif; font-size:11px; color:var(--muted); display:flex; gap:12px; }

/* RIGHT RAIL */
.right-rail { grid-row:2/4; }
.rail-widget { background:var(--surface); border:1px solid var(--border); margin-bottom:24px; }
.rail-header { background:var(--surface2); padding:10px 16px; font-family:'Bebas Neue',sans-serif; font-size:11px; letter-spacing:2px; text-transform:uppercase; color:#3DAA6E; border-bottom:1px solid var(--border); }
.rail-body { padding:16px; }
.rail-desc { font-size:13px; color:var(--text2); line-height:1.7; margin-bottom:14px; }
.email-input { width:100%; background:var(--ink); border:1px solid var(--border2); color:var(--text); padding:10px 14px; font-family:'Archivo',sans-serif; font-size:13px; margin-bottom:8px; outline:none; }
.email-input:focus { border-color:#3DAA6E; }
.email-input::placeholder { color:var(--muted); }
.btn-rail { width:100%; background:#3DAA6E; color:#fff; border:none; padding:10px; font-family:'Bebas Neue',sans-serif; font-size:14px; letter-spacing:2px; cursor:pointer; }
.trending-list { list-style:none; }
.trending-item { display:flex; gap:12px; align-items:flex-start; padding:10px 0; border-bottom:1px solid var(--border); cursor:pointer; }
.trending-item:last-child { border-bottom:none; }
.trend-num { font-family:'Bebas Neue',sans-serif; font-size:20px; color:var(--border2); line-height:1; flex-shrink:0; }
.trend-cat { font-family:'Archivo Narrow',sans-serif; font-size:10px; color:#3DAA6E; letter-spacing:1px; text-transform:uppercase; margin-bottom:3px; }
.trend-title { font-size:12px; font-weight:600; color:var(--text2); line-height:1.4; }

/* ─── ARTICLE VIEWS ───────────────────────────── */
.article-wrap { max-width:800px; margin:0 auto; padding:48px 32px; }
.article-kicker { font-family:'Archivo Narrow',sans-serif; font-size:11px; letter-spacing:2px; text-transform:uppercase; color:#3DAA6E; margin-bottom:12px; }
.article-kicker.purple { color:#3DAA6E; }
.article-h1 { font-family:'Bebas Neue',sans-serif; font-size:44px; line-height:1.02; letter-spacing:1px; color:var(--white); margin-bottom:16px; }
.article-deck { font-size:17px; color:var(--text2); line-height:1.75; font-style:italic; margin-bottom:20px; border-left:3px solid var(--gold); padding-left:16px; }
.article-deck.purple { border-left-color:#3DAA6E; }
.article-meta { display:flex; align-items:center; gap:20px; font-family:'Archivo Narrow',sans-serif; font-size:12px; color:var(--muted); margin-bottom:36px; padding-bottom:24px; border-bottom:1px solid var(--border); }
.article-meta .author { color:var(--text2); font-weight:600; }
.article-body { font-size:15px; line-height:1.85; color:var(--text2); }
.article-body p { margin-bottom:22px; }
.article-body h2 { font-family:'Bebas Neue',sans-serif; font-size:24px; letter-spacing:1px; color:var(--white); margin:40px 0 14px; padding-top:8px; border-top:1px solid var(--border); }
.article-body strong { color:var(--text); }
.article-body a { color:#3DAA6E; text-decoration:none; }
.article-body a:hover { text-decoration:underline; }

/* Brand card (utility article) */
.brand-card { background:var(--surface); border:1px solid var(--border); border-left:3px solid var(--gold); padding:22px 24px; margin:24px 0; }
.brand-card .bc-header { display:flex; align-items:center; gap:10px; margin-bottom:4px; }
.brand-card .bc-name { font-family:'Bebas Neue',sans-serif; font-size:20px; letter-spacing:1px; color:#3DAA6E; }
.status-live { display:inline-flex; align-items:center; gap:4px; background:rgba(0,200,150,0.1); border:1px solid rgba(0,200,150,0.25); color:var(--green); font-family:'Archivo Narrow',sans-serif; font-size:10px; letter-spacing:1.5px; text-transform:uppercase; padding:2px 8px; border-radius:2px; }
.status-live::before { content:'●'; font-size:7px; }
.status-beta { display:inline-flex; align-items:center; gap:4px; background:rgba(200,168,75,0.1); border:1px solid rgba(200,168,75,0.25); color:#3DAA6E; font-family:'Archivo Narrow',sans-serif; font-size:10px; letter-spacing:1.5px; text-transform:uppercase; padding:2px 8px; border-radius:2px; }
.brand-card .bc-tag { font-family:'Archivo Narrow',sans-serif; font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--muted); margin-bottom:12px; }
.brand-card p { font-size:13px; color:var(--text2); line-height:1.75; margin-bottom:10px; }
.brand-card .bc-links { display:flex; gap:16px; flex-wrap:wrap; margin-top:4px; }
.brand-card .bc-link { font-family:'Archivo Narrow',sans-serif; font-size:11px; color:#3DAA6E; letter-spacing:1px; text-transform:uppercase; text-decoration:none; }

/* Gaming data card */
.data-card { background:var(--surface); border:1px solid var(--border); border-left:3px solid #3DAA6E; padding:22px 24px; margin:28px 0; }
.data-card h3 { font-family:'Bebas Neue',sans-serif; font-size:14px; letter-spacing:2px; color:#3DAA6E; text-transform:uppercase; margin-bottom:16px; }
.data-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
.data-stat { text-align:center; padding:14px; background:var(--surface2); border:1px solid var(--border2); }
.data-stat .ds-num { font-family:'Bebas Neue',sans-serif; font-size:32px; color:#3DAA6E; line-height:1; margin-bottom:4px; }
.data-stat .ds-label { font-family:'Archivo Narrow',sans-serif; font-size:10px; letter-spacing:1.5px; text-transform:uppercase; color:var(--muted); }

/* Leaderboard */
.leaderboard { background:var(--surface); border:1px solid var(--border); margin:28px 0; }
.lb-header { background:var(--surface2); padding:12px 20px; font-family:'Bebas Neue',sans-serif; font-size:12px; letter-spacing:2px; color:#3DAA6E; text-transform:uppercase; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:10px; }
.lb-row { display:flex; align-items:center; padding:14px 20px; border-bottom:1px solid var(--border); gap:16px; }
.lb-row:last-child { border-bottom:none; }
.lb-rank { font-family:'Bebas Neue',sans-serif; font-size:22px; width:32px; flex-shrink:0; }
.rank-1 { color:#FFD700; }
.rank-2 { color:#C0C0C0; }
.rank-3 { color:#CD7F32; }
.lb-name { font-family:'Space Mono',monospace; font-size:13px; font-weight:700; color:var(--text); flex:1; }
.lb-amount { font-family:'Bebas Neue',sans-serif; font-size:20px; color:#3DAA6E; }
.lb-unit { font-family:'Archivo Narrow',sans-serif; font-size:10px; color:var(--muted); letter-spacing:1px; text-transform:uppercase; }

/* Code block */
.code-block { background:#050709; border:1px solid var(--border); border-left:3px solid var(--red); padding:18px 20px; margin:24px 0; font-family:'Space Mono',monospace; font-size:12px; line-height:1.8; overflow-x:auto; }
.code-block .code-label { font-family:'Archivo Narrow',sans-serif; font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--red); margin-bottom:10px; }
.code-log { color:#5A9; }
.code-err { color:#E8384A; }
.code-dim { color:#445; }

/* Pull quote */
.pull-quote { border-top:2px solid var(--gold); border-bottom:1px solid var(--border); padding:24px 0 20px; margin:32px 0; }
.pull-quote p { font-family:'Bebas Neue',sans-serif; font-size:26px; letter-spacing:0.5px; color:var(--white); line-height:1.2; }
.pull-quote.purple { border-top-color:#3DAA6E; }
.pull-quote.purple p { color:#3DAA6E; }

/* Globe stats */
.globe-stats { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin:24px 0; }
.globe-stat { background:var(--surface); border:1px solid var(--border); padding:16px 18px; }
.globe-stat .gs-val { font-family:'Bebas Neue',sans-serif; font-size:36px; color:#3DAA6E; line-height:1; margin-bottom:4px; }
.globe-stat .gs-label { font-family:'Archivo Narrow',sans-serif; font-size:11px; color:var(--muted); letter-spacing:1px; text-transform:uppercase; }
.globe-stat .gs-detail { font-size:12px; color:var(--text2); margin-top:6px; line-height:1.5; }

/* Footer */
.site-footer { background:var(--ink); border-top:1px solid var(--border); padding:48px 40px 24px; }
.footer-top { max-width:1280px; margin:0 auto; display:grid; grid-template-columns:2fr 1fr 1fr 1fr; gap:40px; margin-bottom:40px; padding-bottom:40px; border-bottom:1px solid var(--border); }
.footer-brand .tagline { font-size:13px; color:var(--muted); line-height:1.7; margin-top:12px; }

  res.innerHTML=hits.map(a=>'<a class="result-item" href="'+a.slug+'.html"><div class="result-cat">'+esc(a.cat)+'</div><div class="result-title">'+hi(a.title,t)+'</div><div class="result-excerpt">'+hi(a.excerpt,t)+'</div><div class="result-date">'+esc(a.date)+'</div></a>').join('');
}
function clearSearch(){const i=document.getElementById('searchInput');i.value='';i.focus();doSearch('');}
document.getElementById('searchInput').addEventListener('input',e=>doSearch(e.target.value));
const p=new URLSearchParams(window.location.search);const q0=p.get('q');
if(q0){document.getElementById('searchInput').value=q0;doSearch(q0);}
</script>
